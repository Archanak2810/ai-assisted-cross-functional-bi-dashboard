name: Python Syntax Check
on: [push, pull_request]
jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python application, reusable pipeline, and validation script
        run: |
          python -m py_compile app.py src/__init__.py src/bi_pipeline.py scripts/__init__.py scripts/neon_database_validation.py
          echo "Python syntax check passed"
